<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Inventory Report</title>
<style>
:root {
  --bg: #0b0e11;
  --panel: #141820;
  --panel-hover: #1a2030;
  --input: #1c2230;
  --header: #1e2430;
  --text: #eef0f4;
  --muted: #8b93a7;
  --link: #8cb4ff;
  --border: #2a3140;
  --accent: #3b6fd4;
  --accent-soft: rgba(59, 111, 212, 0.15);
  --empty: #181c24;
  --sidebar-w: 240px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font: 13px/1.4 "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}
#app { display: flex; min-height: 100vh; }
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-brand img { width: 32px; height: 32px; border-radius: 6px; }
.sidebar-brand span { font-weight: 600; font-size: 14px; line-height: 1.3; }
#navList { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font: inherit;
  text-align: left;
  cursor: pointer;
}
.nav-btn:hover { background: var(--panel-hover); color: var(--text); }
.nav-btn.active {
  background: #1e3a5f;
  color: var(--text);
  font-weight: 600;
}
.nav-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  fill: none;
  stroke: currentColor;
  opacity: 0.82;
}
.nav-btn.active svg { color: #c8d4f0; opacity: 1; }
.char-filter-section {
  margin-top: 16px;
  padding: 16px 16px 0;
  border-top: 1px solid var(--border);
}
.char-filter-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 10px;
}
#characterFilter { display: flex; flex-wrap: wrap; gap: 6px; }
.char-chip {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
}
.char-chip.active { font-weight: 600; }
.char-chip[data-idx="all"].active { border-color: var(--muted); }
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#pageHeader {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 20px 24px 12px;
  border-bottom: 1px solid var(--border);
}
.page-header-row { flex: 1; min-width: 200px; }
.in-app-bar { width: 100%; flex-basis: 100%; }
.in-app-bar.hidden { display: none; }
.btn-ghost {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--link);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
}
.btn-ghost:hover { background: var(--panel-hover); color: var(--text); }
#pageHeader h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
#pageHeader .meta { color: var(--muted); font-size: 12px; }
#toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  width: 14px;
  height: 14px;
  color: var(--muted);
  pointer-events: none;
}
#toolbar input[type="search"] {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px 7px 32px;
  font: inherit;
  min-width: 200px;
}
#toolbar select {
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font: inherit;
}
#toolbar label { color: var(--muted); font-size: 12px; }
#content { flex: 1; padding: 16px 24px; overflow: auto; }
.panel { display: none; }
.panel.active { display: block; }
.table-wrap {
  overflow: auto;
  max-height: calc(100vh - 220px);
  border: 1px solid var(--border);
  border-radius: 8px;
}
table { width: 100%; border-collapse: collapse; }
table.gear-table {
  width: max-content;
  min-width: 100%;
}
th, td {
  border: 1px solid var(--border);
  padding: 7px 10px;
  text-align: left;
  vertical-align: middle;
  white-space: nowrap;
}
th {
  background: var(--header);
  position: sticky;
  top: 0;
  z-index: 2;
  cursor: pointer;
  user-select: none;
  font-weight: 600;
  font-size: 12px;
}
th.sort-asc::after { content: " ▲"; font-size: 10px; }
th.sort-desc::after { content: " ▼"; font-size: 10px; }
th.sticky-col, td.sticky-col {
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--header);
  width: 1%;
  max-width: 96px;
  white-space: nowrap;
  padding-left: 8px;
  padding-right: 10px;
}
th.sticky-col svg {
  width: 12px;
  height: 12px;
  vertical-align: -2px;
  margin-right: 3px;
}
td.sticky-col { background: #161a22; z-index: 1; }
tr:nth-child(even) td:not(.sticky-col) { background: #12161e; }
tr:nth-child(odd) td:not(.sticky-col) { background: #161a22; }
td.empty { background: var(--empty) !important; color: var(--muted); text-align: center; }
td.empty::before { content: "—"; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
.char-head {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.char-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.block-title {
  margin: 18px 0 8px;
  padding: 8px 10px;
  background: var(--header);
  border-radius: 6px;
  font-weight: 600;
}
.block-sub { color: var(--muted); font-size: 12px; margin: -4px 0 8px; }
.hidden { display: none !important; }
.count-cell { text-align: center; font-weight: 600; }
.count-zero { color: var(--muted); }
#tierLegend {
  padding: 12px 24px 16px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
#tierLegend h3 {
  margin: 0 0 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--muted);
  text-transform: uppercase;
}
.legend-items { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
.legend-note { margin-left: auto; color: var(--muted); font-size: 11px; }
.section-credit {
  margin-top: 12px;
  font-size: 12px;
  color: var(--muted);
}
.section-credit a {
  color: #8cb4ff;
  text-decoration: underline;
}
@media (max-width: 900px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
  .char-filter-section { margin-top: 12px; }
}
</style>
</head>

function sectionExpansions(section) {
  if (section.type !== "table" || section.data.expansionColumn == null) return [];
  const col = section.data.expansionColumn;
  const fromOrder = REPORT.expansionOrder.filter((label) =>
    section.data.rows.some((r) => r[col] === label)
  );
  if (fromOrder.length) return fromOrder;
  const seen = new Set();
  const out = [];
  for (const row of section.data.rows) {
    const value = row[col];
    if (value && !seen.has(value)) {
      seen.add(value);
      out.push(value);
    }
  }
  return out;
}

function expansionFilterOptions(section) {
  const fromData = sectionExpansions(section);
  if (!ACHIEVEMENT_EXPANSION_TABS.has(section.id)) return fromData;

  if (!current || fromData.includes(current)) return fromData;
  return [current, ...fromData];
}

  );
  return match ? match.name : filterKey;

  if (a == null) a = "";
  if (b == null) b = "";

  return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: "base" });
}

      '<option value="visible">Visible</option>' +
      '<option value="hidden">Non-visible</option>';
    sel.value = state.slotFilter;
    sel.addEventListener("change", () => {
      state.slotFilter = sel.value;
      refreshContent();
    });
    toolbar.appendChild(label);
    toolbar.appendChild(sel);
  }

  if (section.type === "table" && section.data.characterColumn != null && section.data.rows.length) {
    const sel = document.createElement("select");
    const options = characterFilterOptions(section);
    sel.innerHTML = options
      .map((opt) => `<option value="${String(opt.value).replace(/"/g, "&quot;")}">${opt.label}</option>`)
      .join("");
    let selected = state.chars[section.id] || "";
    if (!selected && state.characterFilter !== "all") {
      selected = characterDisplayName(state.characterFilter) || "";
    }
    sel.value = selected;
    sel.addEventListener("change", () => {
      state.chars[section.id] = sel.value;
      refreshContent();
    });
    toolbar.appendChild(el("label", null, "Character"));
    toolbar.appendChild(sel);
  }

  if (section.id === "spell_list" && section.data.rows.length) {
    const data = section.data;
    if (data.runeOptions && data.runeOptions.length) {
      const sel = document.createElement("select");
      sel.innerHTML =
        '<option value="">All runes</option>' +
        data.runeOptions.map((r) => `<option value="${String(r).replace(/"/g, "&quot;")}">${r}</option>`).join("");
      sel.value = state.runes[section.id] || "";
      sel.addEventListener("change", () => {
        state.runes[section.id] = sel.value;
        refreshContent();
      });
      toolbar.appendChild(el("label", null, "Rune type"));
      toolbar.appendChild(sel);
    }
  }

  if (section.type === "rune_inventory" && section.data.expansionOptions?.length) {
    const sel = document.createElement("select");
    sel.innerHTML =
      '<option value="">All expansions</option>' +
      section.data.expansionOptions
        .map((x) => `<option value="${String(x).replace(/"/g, "&quot;")}">${x}</option>`)
        .join("");
    sel.value = state.expansions[section.id] || "";
    sel.addEventListener("change", () => {
      state.expansions[section.id] = sel.value;
      refreshContent();
    });
    toolbar.appendChild(el("label", null, "Expansion"));
    toolbar.appendChild(sel);
  }

  if (section.type === "table" && section.data.expansionColumn != null && section.data.rows.length) {
    const sel = document.createElement("select");
    const expansions = expansionFilterOptions(section);
    sel.innerHTML =
      '<option value="">All expansions</option>' +
      expansions.map((x) => `<option value="${x.replace(/"/g, "&quot;")}">${x}</option>`).join("");
    const selected = activeExpansionFilter(section);
    if (
      !Object.prototype.hasOwnProperty.call(state.expansions, section.id) &&
      ACHIEVEMENT_EXPANSION_TABS.has(section.id) &&
      selected
    ) {
      state.expansions[section.id] = selected;
    }
    sel.value = selected;
    sel.addEventListener("change", () => {
      state.expansions[section.id] = sel.value;
      refreshContent();
    });
    toolbar.appendChild(el("label", null, "Expansion"));
    toolbar.appendChild(sel);
  }
}

function updateTierLegend() {
  const footer = document.getElementById("tierLegend");
  const section = activeSection();
  if (!section || section.id !== "team_gear" || !REPORT.gearLegend) {
    footer.classList.add("hidden");
    footer.innerHTML = "";
    return;
  }
  footer.classList.remove("hidden");
  footer.innerHTML = "";
  footer.appendChild(el("h3", null, "Gear tier legend"));
  const row = el("div", "legend-items");
  REPORT.gearLegend.forEach((entry) => {
    const item = el("span", "legend-item");
    const sw = el("span", "legend-swatch");
    sw.style.background = "#" + entry.color;
    item.appendChild(sw);
    item.appendChild(document.createTextNode(entry.label));
    row.appendChild(item);
  });
  const note = el("span", "legend-note", "Legend shows highest tier color present for quick reference.");
  row.appendChild(note);
  footer.appendChild(row);
}

function updateGearMatrixContent(content, section, tierMode) {
  const data = section.data;
  const q = (state.searches[section.id] || "").trim().toLowerCase();
  const colIndices = filteredColumnIndices(data.characters);

  const wrap = el("div", "table-wrap");
  const table = document.createElement("table");
  table.className = "gear-table";
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");

  const slotTh = el("th", "sticky-col");
  slotTh.appendChild(icon("icon-pin"));
  slotTh.appendChild(document.createTextNode(" Slot"));
  headRow.appendChild(slotTh);

  colIndices.forEach((idx) => {
    const th = el("th");
    const head = el("span", "char-head");
    const dot = el("span", "char-dot");
    const color = charColor(idx);
    dot.style.background = color.dot;
    head.appendChild(dot);
    head.appendChild(document.createTextNode(data.characters[idx]));
    th.appendChild(head);
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  data.rows.forEach((row) => {
    if (!rowPassesSlotFilter(row)) return;
    const rowText = [row.slot, ...row.cells.map((c) => (c ? (c.name || c.label || "") : ""))]
      .join(" ")
      .toLowerCase();
    if (q && !rowText.includes(q)) return;

    const tr = document.createElement("tr");
    tr.appendChild(el("td", "sticky-col", row.slot));
    colIndices.forEach((idx) => {
      const cell = row.cells[idx];
      const td = document.createElement("td");
      if (!cell) {
        td.className = "empty";
      } else if (tierMode) {
        td.textContent = cell.label || "";
        const style = gearStyle(cell);
        if (style) td.setAttribute("style", style);
      } else {
        if (cell.url) {
          const a = document.createElement("a");
          a.href = cell.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = cell.name;
          td.appendChild(a);
        } else {
          td.textContent = cell.name;
        }
        const style = gearStyle(cell);
        if (style) td.setAttribute("style", style);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  content.appendChild(wrap);
}

function updateTableContent(content, section) {
  const data = section.data;
  const sort = state.sorts[section.id] || { col: null, dir: 1 };

  let rows = data.rows.slice();
  const q = (state.searches[section.id] || "").trim().toLowerCase();
  if (q) rows = rows.filter((r) => r.join(" ").toLowerCase().includes(q));

  let charFilter = state.chars[section.id] || "";
  if (!charFilter && state.characterFilter !== "all") {
    charFilter = characterDisplayName(state.characterFilter) || "";
  }
  if (data.characterColumn != null && charFilter) {
    rows = rows.filter((r) => r[data.characterColumn] === charFilter);
  }
  if (data.expansionColumn != null) {
    const expansionFilter = activeExpansionFilter(section);
    if (expansionFilter) {
      rows = rows.filter((r) => r[data.expansionColumn] === expansionFilter);
    }
  }
  if (data.blockColumn != null && state.blocks[section.id]) {
    rows = rows.filter((r) => r[data.blockColumn] === state.blocks[section.id]);
  }
  if (data.runeColumn != null && state.runes[section.id]) {
    rows = rows.filter((r) => r[data.runeColumn] === state.runes[section.id]);
  }
  if (sort.col != null) {
    rows.sort((a, b) => sort.dir * compareValues(a[sort.col], b[sort.col]));
  }

  const wrap = el("div", "table-wrap");
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  data.columns.forEach((col, idx) => {
    const th = el("th", sort.col === idx ? (sort.dir > 0 ? "sort-asc" : "sort-desc") : null, col);
    th.addEventListener("click", () => {
      if (sort.col === idx) sort.dir *= -1;
      else { sort.col = idx; sort.dir = 1; }
      state.sorts[section.id] = sort;
      refreshContent();
    });
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  rows.forEach((row) => {
    const tr = document.createElement("tr");
    row.forEach((val) => tr.appendChild(el("td", null, val == null ? "" : String(val))));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  content.appendChild(wrap);
  if (data.credit && data.credit.text && data.credit.url) {
    const credit = el("p", "section-credit");
    const link = document.createElement("a");
    link.href = data.credit.url;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = data.credit.text;
    credit.appendChild(link);
    content.appendChild(credit);
  }
}

function updateMissingRunesContent(content, section) {
  const data = section.data;
  const q = (state.searches[section.id] || "").trim().toLowerCase();
  const colIndices = filteredColumnIndices(data.characters);

  data.blocks.forEach((block) => {
    content.appendChild(el("div", "block-title", block.label));
    content.appendChild(el("div", "block-sub", block.theme));
    const wrap = el("div", "table-wrap");
    const table = document.createElement("table");
    const headRow = document.createElement("tr");
    headRow.appendChild(el("th", null, "Rune tier"));
    colIndices.forEach((idx) => headRow.appendChild(el("th", null, data.characters[idx])));
    table.appendChild(document.createElement("thead")).appendChild(headRow);
    const tbody = document.createElement("tbody");
    block.rows.forEach((row) => {
      if (q && !row.tier.toLowerCase().includes(q)) return;
      const tr = document.createElement("tr");
      const tierTd = el("td", null, row.tier);
      const tierColor = REPORT.theme.spellTiers[row.tier];
      if (tierColor) tierTd.style.background = "#" + tierColor;
      tr.appendChild(tierTd);
      colIndices.forEach((idx) => {
        const count = row.counts[idx];
        const td = el("td", count ? "count-cell" : "count-cell count-zero", count ? String(count) : "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    content.appendChild(wrap);
  });
}

function updateRuneInventoryContent(content, section) {
  const data = section.data;
  const q = (state.searches[section.id] || "").trim().toLowerCase();
  const expansion = state.expansions[section.id] || "";
  const colIndices = filteredColumnIndices(data.characters);
  const families = expansion
    ? data.families.filter((family) => family.label === expansion)
    : data.families;

  families.forEach((family) => {
    content.appendChild(el("div", "block-title", family.label));
    content.appendChild(el("div", "block-sub", `${family.label} · ${family.itemPattern}`));
    const wrap = el("div", "table-wrap");
    const table = document.createElement("table");
    const headRow = document.createElement("tr");
    headRow.appendChild(el("th", null, "Rune tier"));
    colIndices.forEach((idx) => headRow.appendChild(el("th", null, data.characters[idx])));
    table.appendChild(document.createElement("thead")).appendChild(headRow);
    const tbody = document.createElement("tbody");
    family.rows.forEach((row) => {
      if (q && !row.tier.toLowerCase().includes(q)) return;
      const tr = document.createElement("tr");
      const tierTd = el("td", null, row.tier);
      const tierColor = REPORT.theme.spellTiers[row.tier];
      if (tierColor) tierTd.style.background = "#" + tierColor;
      tr.appendChild(tierTd);
      colIndices.forEach((idx) => {
        const count = row.counts[idx];
        const td = el("td", count ? "count-cell" : "count-cell count-zero", count ? String(count) : "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    content.appendChild(wrap);
  });
}

function updatePanelContent(panel, section) {
  panel.innerHTML = "";
  if (section.type === "gear_matrix") {
    updateGearMatrixContent(panel, section, section.id === "gear_t_level");
  } else if (section.type === "table") {
    updateTableContent(panel, section);
  } else if (section.type === "missing_runes") {
    updateMissingRunesContent(panel, section);
  } else if (section.type === "rune_inventory") {
    updateRuneInventoryContent(panel, section);
  }
}

function refreshContent() {
  const section = activeSection();
  const panel = document.getElementById("panel-" + state.activeTab);
  if (section && panel) updatePanelContent(panel, section);
  updateTierLegend();
}

function renderActivePanel() {
  refreshContent();
  updateToolbar();
}

function setActiveTab(idx) {
  state.activeTab = idx;
  document.querySelectorAll(".nav-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  document.querySelectorAll(".panel").forEach((p, i) => p.classList.toggle("active", i === idx));
  renderActivePanel();
}

function setCharacterFilter(key) {
  state.characterFilter = key;
  document.querySelectorAll(".char-chip").forEach((chip) => {
    chip.classList.toggle("active", chip.dataset.key === key);
  });
  refreshContent();
}

function initCharacterFilter() {
  const container = document.getElementById("characterFilter");
  const characters = REPORT.meta.characters || [];
  characters.forEach((character, idx) => {
    const chip = el("button", "char-chip");
    chip.type = "button";
    chip.dataset.key = character.shortName;
    chip.dataset.idx = String(idx);
    chip.textContent = character.shortName;
    const color = charColor(idx);
    chip.style.borderColor = color.border;
    chip.addEventListener("click", () => setCharacterFilter(character.shortName));
    container.appendChild(chip);
  });
  const allChip = el("button", "char-chip active");
  allChip.type = "button";
  allChip.dataset.key = "all";
  allChip.dataset.idx = "all";
  allChip.textContent = "All";
  allChip.addEventListener("click", () => setCharacterFilter("all"));
  container.appendChild(allChip);
}

function init() {
  const meta = REPORT.meta;
  if (meta.logoDataUri) {
    document.getElementById("logo").src = meta.logoDataUri;
  }
  document.getElementById("reportTitle").textContent = meta.reportTitle || "Team Inventory";
  const datePart = (meta.generatedAt || "").split(" ")[0];
  document.getElementById("reportMeta").textContent =
    `${meta.characterCount || 0} characters · generated ${datePart}`;

  const nav = document.getElementById("navList");
  const content = document.getElementById("content");
  REPORT.sections.forEach((section, idx) => {
    const btn = el("button", "nav-btn" + (idx === 0 ? " active" : ""));
    btn.type = "button";
    btn.appendChild(icon(SECTION_ICONS[section.id] || "icon-chest"));
    btn.appendChild(document.createTextNode(section.title));
    btn.addEventListener("click", () => setActiveTab(idx));
    nav.appendChild(btn);

    const panel = el("div", "panel" + (idx === 0 ? " active" : ""));
    panel.id = "panel-" + idx;
    content.appendChild(panel);
    if (idx === 0) updatePanelContent(panel, section);
  });

  initCharacterFilter();
  updateToolbar();
  updateTierLegend();
}

function showInAppChrome() {
  const bar = document.getElementById("inAppBar");
  if (bar) bar.classList.remove("hidden");
  const btn = document.getElementById("backToSetup");
  if (btn && !btn.dataset.bound) {
    btn.dataset.bound = "1";
    btn.addEventListener("click", () => {
      if (window.pywebview && pywebview.api.navigate_to_setup) {
        pywebview.api.navigate_to_setup();
      }
    });
  }
}

if (REPORT) {
  init();
  if (window.pywebview) showInAppChrome();
}
</script>
